<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;700&family=Roboto:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<body>
    <header class="header">
        <section>
            <a href="#" class="logo">
                <img src="./img/logobeleza.jpg" alt="Logo" style="width:150px;">
            </a>
            <nav class="navbar">
                <a href="#">Home</a>
                <a href="#nossos-servicos">Nossos Serviços</a>
                <a href="#endereco">Endereço</a>

        <div class="box">
            <img src="./img/pintura.jpg" alt="Pintura">
